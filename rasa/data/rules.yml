version: "3.1"

rules:
  - rule: Responder saludo
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Responder despedida
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Responder fallback
    steps:
      - intent: fallback
      - action: utter_fallback
