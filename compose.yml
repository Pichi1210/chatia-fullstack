services:
  db:
    image: postgres:17
    restart: always
    ports:
    - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}

  prestart:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    command: bash scripts/prestart.sh
    restart: "no"
    labels:
      - "coolify.managed=false"
    environment:
      DOMAIN: ${DOMAIN}
      FRONTEND_HOST: ${FRONTEND_HOST}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      YANDEX_API_KEY: ${YANDEX_API_KEY}

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    expose:
      - "8000"
    environment:
      DOMAIN: ${DOMAIN}
      FRONTEND_HOST: ${FRONTEND_HOST}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL}
      POSTGRES_SERVER: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SENTRY_DSN: ${SENTRY_DSN}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      RASA_URL: ${RASA_URL:-http://rasa:5005}
      RASA_ENABLED: ${RASA_ENABLED:-false}
      RASA_CONFIDENCE_THRESHOLD: ${RASA_CONFIDENCE_THRESHOLD:-0.55}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

  rasa:
    image: rasa/rasa:3.8.0a12-full
    profiles:
      - rasa
    working_dir: /app
    volumes:
      - ./rasa:/app
    command: >
      run
      --enable-api
      --cors "*"
      --debug
      --model /app/models
    expose:
      - "5005"
    depends_on:
      - backend

  rasa-actions:
    image: rasa/rasa-sdk:3.6.2
    profiles:
      - rasa-actions
    working_dir: /app
    volumes:
      - ./rasa/actions:/app/actions
    expose:
      - "5055"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        NODE_ENV: production
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    expose:
      - "8080"
    environment:
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  app-db-data:
